# NomadCoin Logo SVG
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27"/>
      <stop offset="100%" style="stop-color:#1A1F4E"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4"/>
      <stop offset="50%" style="stop-color:#7C4DFF"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7C4DFF;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00BCD4" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="url(#coin)" stroke-width="4"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#coin)" stroke-width="3" opacity="0.6"/>
  
  <!-- Compass/Nomad symbol -->
  <g filter="url(#shadow)">
    <!-- North pointer -->
    <polygon points="256,80 270,200 256,220 242,200" fill="url(#coin)" opacity="0.9"/>
    <!-- South pointer -->
    <polygon points="256,432 270,312 256,292 242,312" fill="url(#coin)" opacity="0.6"/>
    <!-- East pointer -->
    <polygon points="432,256 312,270 292,256 312,242" fill="url(#coin)" opacity="0.7"/>
    <!-- West pointer -->
    <polygon points="80,256 200,270 220,256 200,242" fill="url(#coin)" opacity="0.5"/>
  </g>
  
  <!-- Center coin -->
  <circle cx="256" cy="256" r="60" fill="url(#coin)" filter="url(#glow-filter)"/>
  <circle cx="256" cy="256" r="50" fill="#0A0E27"/>
  <circle cx="256" cy="256" r="45" fill="none" stroke="url(#coin)" stroke-width="2"/>
  
  <!-- N letter -->
  <text x="256" y="275" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#coin)" text-anchor="middle">N</text>
  
  <!-- Orbiting dots -->
  <circle cx="256" cy="56" r="6" fill="#00BCD4" filter="url(#glow-filter)"/>
  <circle cx="456" cy="256" r="6" fill="#7C4DFF" filter="url(#glow-filter)"/>
  <circle cx="256" cy="456" r="6" fill="#FFD700" filter="url(#glow-filter)"/>
  <circle cx="56" cy="256" r="6" fill="#00BCD4" filter="url(#glow-filter)"/>
  
  <!-- Connection lines -->
  <line x1="256" y1="56" x2="456" y2="256" stroke="url(#coin)" stroke-width="1" opacity="0.3"/>
  <line x1="456" y1="256" x2="256" y2="456" stroke="url(#coin)" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="456" x2="56" y2="256" stroke="url(#coin)" stroke-width="1" opacity="0.3"/>
  <line x1="56" y1="256" x2="256" y2="56" stroke="url(#coin)" stroke-width="1" opacity="0.3"/>
</svg>
