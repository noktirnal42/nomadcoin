name: Mobile CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'mobile/**'

jobs:
  flutter-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'

    - name: Get dependencies
      working-directory: mobile/nomadcoin
      run: flutter pub get

    - name: Analyze
      working-directory: mobile/nomadcoin
      run: flutter analyze

    - name: Run tests
      working-directory: mobile/nomadcoin
      run: flutter test

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'

    - name: Get dependencies
      working-directory: mobile/nomadcoin
      run: flutter pub get

    - name: Build iOS (simulator)
      working-directory: mobile/nomadcoin
      run: flutter build ios --simulator --no-codesign

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Get dependencies
      working-directory: mobile/nomadcoin
      run: flutter pub get

    - name: Build Android APK
      working-directory: mobile/nomadcoin
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nomadcoin-android-apk
        path: mobile/nomadcoin/build/app/outputs/flutter-apk/app-release.apk
